<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALIAS: Wedding Edition & Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style id="print-page-style">
        @page { size: 2.5in 3.5in; margin: 0; }
    </style>

    <style>
        :root {
            --theme-color: #8fa688;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Frank Ruhl Libre', serif;
            background-color: #f7f3e8; 
        }

        #control-panel { 
            padding: 20px; text-align: center; background: #fff; 
            border-bottom: 2px solid #ddd; 
            font-family: sans-serif; direction: ltr;
        }

        .global-settings {
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; margin-bottom: 15px; padding: 10px;
            background-color: #f7f3e8; border-radius: 8px; border: 1px solid #ddd;
            width: fit-content; margin-left: auto; margin-right: auto;
        }

        .global-settings label { font-weight: bold; color: #555; }
        
        .global-settings input[type="color"] {
            width: 40px; height: 35px; border: 1px solid #ccc; 
            border-radius: 4px; padding: 0; cursor: pointer;
        }

        .tabs { margin: 15px 0; display: flex; justify-content: center; gap: 10px; }

        .tab-btn {
            background-color: #e2e8e0; color: #555; border: 2px solid transparent;
            padding: 10px 25px; font-size: 16px; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-family: 'Frank Ruhl Libre', serif;
            transition: 0.3s;
        }

        .tab-btn.active { background-color: var(--theme-color); color: white; border: 2px solid var(--theme-color); filter: brightness(0.9); }

        .export-btn {
            background-color: #bfa071; color: white; border: none;
            padding: 10px 20px; font-size: 14px; border-radius: 5px;
            cursor: pointer; margin: 5px; font-weight: bold;
        }

        .export-btn:hover { background-color: #a6895d; }
        
        .upload-btn {
            background-color: var(--theme-color); color: white; border: none;
            padding: 8px 16px; font-size: 14px; border-radius: 5px;
            cursor: pointer; margin: 0; font-weight: bold; display: inline-block;
        }
        
        .upload-btn:hover { filter: brightness(0.85); }

        #loading-msg { display: none; color: var(--theme-color); font-weight: bold; margin-top: 10px; }

        #deck-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        #board-container { display: none; justify-content: center; padding: 20px; }
        #card-backs-container { display: none; justify-content: center; padding: 20px; }
        
        #board-tools, #cards-tools, #backs-tools { 
            display: none; justify-content: center; align-items: center; 
            gap: 15px; margin-top: 15px; flex-wrap: wrap;
        } 
        
        /* Show cards-tools by default since Cards tab is default */
        #cards-tools { display: flex; }

        .slider-container, .info-badge, .input-container {
            display: flex; align-items: center; gap: 10px; 
            background: #f7f3e8; padding: 6px 15px; 
            border-radius: 5px; border: 1px solid #ddd;
            font-size: 14px; font-weight: bold; color: #555;
        }
        
        .info-badge { background: #e2e8e0; border-color: #cbd5c1; }

        .slider-container input[type="range"] { cursor: pointer; }
        .input-container input { 
            width: 50px; text-align: center; border: 1px solid #ccc; 
            border-radius: 4px; padding: 2px; font-weight: bold;
        }

        /* --- Global Card Styling --- */
        .card {
            width: 2.5in; height: 3.5in; background-color: var(--theme-color); 
            box-sizing: border-box; page-break-after: always; break-after: page;
            display: flex; flex-direction: column; box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            margin: 10px; padding: 8px; 
        }

        .inner-card {
            border-radius: 12px; 
            width: 100%; height: 100%; display: flex; flex-direction: column;
            box-sizing: border-box; overflow: hidden;
        }

        #deck-container .inner-card { background-color: #ffffff; }
        
        .card-header-area {
            text-align: center; padding: 15px 0 5px 0; 
            display: flex; justify-content: center; align-items: center;
        }

        .ring-icon { width: 50px; height: auto; filter: grayscale(100%); }

        .word-list {
            margin: 0 auto; padding: 0; list-style: none; counter-reset: word-counter;
            width: 85%; flex-grow: 1; display: flex; flex-direction: column; 
            justify-content: space-evenly; padding-bottom: 25px; 
        }
        
        .word-list li {
            counter-increment: word-counter; font-size: 14pt; font-weight: 700; 
            color: #333; display: flex; align-items: center; 
            padding: 6px 0; border-bottom: 1px solid #eee; 
        }
        
        .word-list li:last-child { border-bottom: none; }
        
        .word-list li::before {
            content: counter(word-counter); color: #bfa071; font-weight: 700;
            font-size: 15pt; width: 25px; margin-left: 10px; text-align: left; display: inline-block;
        }

        /* --- Card Back Design --- */
        #card-backs-container .inner-card {
            justify-content: center; 
            align-items: center;
            border: none; 
        }

        /* --- Board Game Design --- */
        .board-wrapper {
            width: 297mm; height: 210mm; background-color: #ffffff; border: 15px solid var(--theme-color);
            border-radius: 40px; box-sizing: border-box; position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden;
        }

        @media print { 
            body { background-color: white; } 
            #control-panel { display: none !important; } 
            .card { box-shadow: none; margin: 0; }
            #deck-container { padding: 0; display: block; }
            #card-backs-container { padding: 0; display: block; }
            .board-wrapper { box-shadow: none; margin: 0; border-radius: 0; }
            #board-container { padding: 0; }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2 style="color: var(--theme-color); margin-top: 0; font-family:'Frank Ruhl Libre', serif; direction:rtl; font-size: 28px;">ALIAS: מהדורת חתונה</h2>
        
        <!-- Global Settings -->
        <div class="global-settings">
            <label for="theme-color-picker">🎨 Theme Color:</label>
            <input type="color" id="theme-color-picker" value="#8fa688">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('cards')">כרטיסיות (Cards)</button>

        <div>
            <button class="export-btn" id="btn-export-pdf" onclick="window.print()">Export as PDF</button>
            <button class="export-btn" id="btn-export-img" onclick="exportImages()">Export Selected Tab (PNGs/ZIP)</button>
        </div>

        <!-- Tools visible on Cards tab -->
        <div id="cards-tools">

            <label for="words-upload" class="upload-btn">📄 Upload Words (.txt)</label>

            </div>

            <div class="info-badge" id="card-count-display">

        </div>

        <!-- Tools visible on Board tab -->
        <div id="board-tools">
            <div class="info-badge">📏 A4 Landscape (1:√2)</div>

            <label for="start-image-upload" class="upload-btn">🏁 Upload Start Photo</label>
            <input type="file" id="start-image-upload" accept="image/*" style="display: none;">

            <label for="bg-image-upload" class="upload-btn">🖼️ Upload Background Photo</label>
            <input type="file" id="bg-image-upload" accept="image/*" style="display: none;">

            <div class="slider-container">
                <label for="opacity-slider">Background Fade:</label>
                <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.10">
            </div>
        </div>

        <!-- Tools visible on Back tab -->
        <div id="backs-tools">
            <div class="info-badge">📏 2.5" x 3.5" (Poker Size, 5:7)</div>
            
            <label for="back-image-upload" class="upload-btn">📷 Upload Back Photo</label>
            <input type="file" id="back-image-upload" accept="image/*" style="display: none;">

            <div class="slider-container">
                <label for="back-size-slider">Circle Size:</label>
                <input type="range" id="back-size-slider" min="20" max="100" value="75">
            </div>

            <div class="slider-container">
                <label for="back-fade-slider">Solid Center (Opacity Area):</label>
                <input type="range" id="back-fade-slider" min="0" max="100" value="60">
            </div>
        </div>

        <div id="loading-msg">Processing... Please wait.</div>
    </div>

    <!-- TAB 1: CARDS FRONT -->
    <div id="deck-container"></div>

    <!-- TAB 2: BOARD GAME -->
    <div id="board-container">
        <div class="board-wrapper" id="board-capture-area">
            <svg id="board-svg" viewBox="0 0 1200 850" width="100%" height="100%" preserveAspectRatio="none">
                <image id="bg-image" href="https://cdn-icons-png.flaticon.com/512/2457/2457612.png" 
                       x="0" y="0" width="1200" height="850" opacity="0.10" filter="grayscale(100%)" preserveAspectRatio="xMidYMid meet"/>
                <path id="logic-path" fill="none" stroke="#bfa071" stroke-width="8" stroke-dasharray="15, 12" stroke-linecap="round" opacity="0.6"/>
                <g id="board-spaces"></g>
            </svg>
        </div>
    </div>
    
    <!-- TAB 3: CARDS BACK -->
    <div id="card-backs-container"></div>

    <script type="text/plain" id="raw-words">

    <script>
        // State Variables
        let themeColor = "#8fa688";
        let wordsPerCard = 6; 
        const finishImageBase64 = "https://cdn-icons-png.flaticon.com/512/2457/2457612.png"; 
        
        let uploadedStartImageBase64 = null;
        let backImageBase64 = finishImageBase64; 
        let backImageSize = 75; 
        let backImageSolid = 60; 

        window.onload = function() {
            document.documentElement.style.setProperty('--theme-color', themeColor);
            generateCards();
            generateBoard();
            generateCardBacks();
        };

        // --- Helper for Start Image SVG Generation ---
        function getStartVectorBase64() {
            if (uploadedStartImageBase64) return uploadedStartImageBase64;
            
            // Generates a dynamic SVG incorporating the current theme color
            const customStartSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#ffffff" /><circle cx="42" cy="55" r="22" fill="none" stroke="${themeColor}" stroke-width="5"/><circle cx="58" cy="55" r="22" fill="none" stroke="#bfa071" stroke-width="5"/><polygon points="42,25 50,34 42,38 34,34" fill="#bfa071"/></svg>`;
            return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(customStartSVG);
        }

        // --- Global Settings Handlers ---
        document.getElementById('theme-color-picker').addEventListener('input', function(event) {
            themeColor = event.target.value;
            // Update CSS Variable for static elements
            document.documentElement.style.setProperty('--theme-color', themeColor);

            // Re-render elements that depend on inline JS variables (like SVGs)
            generateCards();
            generateBoard();
            generateCardBacks();
        });

        // --- Configuration Handlers ---
        document.getElementById('words-per-card').addEventListener('input', function(event) {
            let val = parseInt(event.target.value);
            if (val >= 2 && val <= 12) {
                wordsPerCard = val;
                generateCards();
                generateBoard(); 
            }
        });

        document.getElementById('words-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('raw-words').textContent = e.target.result;
                generateCards();
                generateBoard(); 
            };
            reader.readAsText(file);
        });

        // --- Board Image Handlers ---
        document.getElementById('start-image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedStartImageBase64 = e.target.result;
                generateBoard();
            };
            reader.readAsDataURL(file); 
        });

        document.getElementById('bg-image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const bgNode = document.getElementById('bg-image');
                bgNode.setAttribute('href', e.target.result);
                bgNode.removeAttribute('filter'); 
            };
            reader.readAsDataURL(file); 
        });

        document.getElementById('opacity-slider').addEventListener('input', function(event) {
            document.getElementById('bg-image').setAttribute('opacity', event.target.value);
        });

        // --- Card Back Handlers ---
        document.getElementById('back-image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                backImageBase64 = e.target.result;
                generateCardBacks(); 
            };
            reader.readAsDataURL(file); 
        });

        document.getElementById('back-size-slider').addEventListener('input', function(event) {
            backImageSize = event.target.value;
            generateCardBacks();
        });

        document.getElementById('back-fade-slider').addEventListener('input', function(event) {
            backImageSolid = event.target.value;
            generateCardBacks();
        });

        // --- TAB MANAGEMENT ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');

            const pageStyle = document.getElementById('print-page-style');
            const btnImg = document.getElementById('btn-export-img');
            const boardTools = document.getElementById('board-tools');
            const cardsTools = document.getElementById('cards-tools');
            const backsTools = document.getElementById('backs-tools');

            document.getElementById('deck-container').style.display = 'none';
            document.getElementById('board-container').style.display = 'none';
            document.getElementById('card-backs-container').style.display = 'none';
            boardTools.style.display = 'none'; 
            cardsTools.style.display = 'none';
            backsTools.style.display = 'none';

            if (tab === 'cards') {
                document.getElementById('deck-container').style.display = 'flex';
                cardsTools.style.display = 'flex'; 
                pageStyle.innerHTML = '@page { size: 2.5in 3.5in; margin: 0; }';
                btnImg.textContent = 'Export Cards as ZIP (PNGs)';
            } else if (tab === 'board') {
                document.getElementById('board-container').style.display = 'flex';
                boardTools.style.display = 'flex'; 
                pageStyle.innerHTML = '@page { size: A4 landscape; margin: 0; }';
                btnImg.textContent = 'Export Board as PNG';
            } else if (tab === 'backs') {
                document.getElementById('card-backs-container').style.display = 'flex';
                backsTools.style.display = 'flex';
                pageStyle.innerHTML = '@page { size: 2.5in 3.5in; margin: 0; }';
                btnImg.textContent = 'Export Back as PNG';
            }
        }

        // --- CARDS (FRONT) GENERATOR ---
        function generateCards() {
            const deckContainer = document.getElementById('deck-container');
            deckContainer.innerHTML = '';
            const rawText = document.getElementById('raw-words').textContent;
            const myWords = rawText.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0);

            // Update card count display
            const totalCards = Math.ceil(myWords.length / wordsPerCard);
            const countDisplay = document.getElementById('card-count-display');
            if (countDisplay) {
                countDisplay.textContent = `Total Cards: ${totalCards}`;
            }

            for (let i = 0; i < myWords.length; i += wordsPerCard) {
                const cardWords = myWords.slice(i, i + wordsPerCard);
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.style.borderRadius = '0px'; 
                
                // Set the specific edge color via inline style
                cardDiv.style.backgroundColor = themeColor;
                
                const innerCard = document.createElement('div');
                innerCard.className = 'inner-card';

                const headerArea = document.createElement('div');
                headerArea.className = 'card-header-area';
                headerArea.innerHTML = `<img class="ring-icon" src="https://cdn-icons-png.flaticon.com/512/2457/2457612.png" crossorigin="anonymous">`;
                innerCard.appendChild(headerArea);

                const ol = document.createElement('ol');
                ol.className = 'word-list';
                cardWords.forEach(word => {
                    const li = document.createElement('li');
                    li.textContent = word;
                    ol.appendChild(li);
                });
                
                innerCard.appendChild(ol);
                cardDiv.appendChild(innerCard);
                deckContainer.appendChild(cardDiv);
            }
        }

        // --- CARDS (BACK) GENERATOR ---
        function generateCardBacks() {
            const container = document.getElementById('card-backs-container');
            container.innerHTML = ''; 

            const outerCardDiv = document.createElement('div');
            outerCardDiv.className = 'card';
            outerCardDiv.style.borderRadius = '0px'; 
            
            // Set background color via inline style
            outerCardDiv.style.backgroundColor = themeColor;
            outerCardDiv.id = 'back-capture-area'; 

            const innerCardDiv = document.createElement('div');
            innerCardDiv.className = 'inner-card';
            innerCardDiv.style.backgroundColor = themeColor;

            // SVG implementation for perfectly dynamic radial fading that works with html2canvas
            const svgContent = `
                <svg viewBox="0 0 100 100" width="${backImageSize}%" height="${backImageSize}%" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <radialGradient id="fadeGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="${backImageSolid}%" stop-color="white" stop-opacity="1" />
                            <stop offset="100%" stop-color="white" stop-opacity="0" />
                        </radialGradient>
                        <mask id="imageMask">
                            <circle cx="50" cy="50" r="50" fill="url(#fadeGradient)" />
                        </mask>
                    </defs>
                    <image href="${backImageBase64}" x="0" y="0" width="100" height="100" preserveAspectRatio="xMidYMid slice" mask="url(#imageMask)" />
                </svg>
            `;

            innerCardDiv.innerHTML = svgContent;
            outerCardDiv.appendChild(innerCardDiv);
            container.appendChild(outerCardDiv);
        }

        // --- BOARD GENERATOR ---
        function generateBoard() {
            // Temporarily display the board so the SVG path length can be calculated
            const boardContainer = document.getElementById('board-container');
            const wasHidden = window.getComputedStyle(boardContainer).display === 'none';
            if (wasHidden) {
                boardContainer.style.visibility = 'hidden';
                boardContainer.style.display = 'flex';
            }

            // Ensure total playable spaces are a perfect multiple of 'wordsPerCard'
            const targetSpaces = 70;
            const exactMultiples = Math.round(targetSpaces / wordsPerCard) * wordsPerCard;
            const dynamicNumSpaces = exactMultiples + 1; // +1 to account for Finish space

            const path = document.getElementById('logic-path');
            const spacesContainer = document.getElementById('board-spaces');
            spacesContainer.innerHTML = '';
            
            const cx = 600, cy = 425; 
            let d = [];
            let numPoints = 1200; 
            let turns = 3.5, startAngle = -Math.PI / 4; 
            
            for (let i = 0; i <= numPoints; i++) {
                let t = 1 - (i / numPoints); 
                let angle = startAngle - (1 - t) * turns * 2 * Math.PI;
                let p = 2 + (t * 6); 
                let rectFactor = Math.pow(Math.pow(Math.abs(Math.cos(angle)), p) + Math.pow(Math.abs(Math.sin(angle)), p), -1 / p);
                let minRx = 65, minRy = 65, maxRx = 540, maxRy = 360; 
                let rx = (minRx + t * (maxRx - minRx)) * rectFactor;
                let ry = (minRy + t * (maxRy - minRy)) * rectFactor;
                let x = cx + rx * Math.cos(angle), y = cy + ry * Math.sin(angle);
                if (i === 0) d.push(`M ${x} ${y}`); else d.push(`L ${x} ${y}`);
            }
            path.setAttribute('d', d.join(' '));

            const pathLength = path.getTotalLength();
            for (let i = 0; i <= dynamicNumSpaces; i++) {
                const point = path.getPointAtLength((i / dynamicNumSpaces) * pathLength);
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", point.x); circle.setAttribute("cy", point.y);
                circle.setAttribute("r", 20); circle.setAttribute("fill", "#ffffff");
                
                // Color the spaces dynamically
                circle.setAttribute("stroke", themeColor); 
                circle.setAttribute("stroke-width", "4");
                
                if (i === 0) {
                    circle.setAttribute("r", 40); circle.setAttribute("fill", "#fdf8f0"); circle.setAttribute("stroke", "#bfa071");
                    spacesContainer.appendChild(circle);
                    const clipPath = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
                    clipPath.setAttribute("id", "start-clip");
                    const clipCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    clipCircle.setAttribute("cx", point.x); clipCircle.setAttribute("cy", point.y); clipCircle.setAttribute("r", 36); 
                    clipPath.appendChild(clipCircle); spacesContainer.appendChild(clipPath);
                    const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                    img.setAttribute("id", "start-image-node"); 
                    img.setAttribute("href", getStartVectorBase64()); img.setAttribute("x", point.x - 36); img.setAttribute("y", point.y - 36);
                    img.setAttribute("width", 72); img.setAttribute("height", 72); 
                    img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#start-clip)");
                    spacesContainer.appendChild(img);
                } else if (i === dynamicNumSpaces) {
                    circle.setAttribute("r", 60); circle.setAttribute("fill", "#fdf8f0"); circle.setAttribute("stroke", "#bfa071");
                    spacesContainer.appendChild(circle);
                    const clipPath = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
                    clipPath.setAttribute("id", "finish-clip");
                    const clipCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    clipCircle.setAttribute("cx", point.x); clipCircle.setAttribute("cy", point.y); clipCircle.setAttribute("r", 56); 
                    clipPath.appendChild(clipCircle); spacesContainer.appendChild(clipPath);
                    const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                    img.setAttribute("href", finishImageBase64); img.setAttribute("x", point.x - 56); img.setAttribute("y", point.y - 56);
                    img.setAttribute("width", 112); img.setAttribute("height", 112); 
                    img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#finish-clip)");
                    spacesContainer.appendChild(img);
                } else {
                    spacesContainer.appendChild(circle);
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", point.x); text.setAttribute("y", point.y + 6); 
                    text.setAttribute("font-family", "'Frank Ruhl Libre', serif"); text.setAttribute("font-size", "18");
                    text.setAttribute("font-weight", "bold"); text.setAttribute("fill", "#333333"); text.setAttribute("text-anchor", "middle");
                    const displayNum = ((i - 1) % wordsPerCard) + 1;
                    text.textContent = displayNum;
                    spacesContainer.appendChild(text);
                }
            }

            // Restore visibility state
            if (wasHidden) {
                boardContainer.style.display = 'none';
                boardContainer.style.visibility = 'visible'; 
            }
        }

        // --- EXPORT HANDLING ---
        function exportImages() {
            const activeTab = document.querySelector('.tab-btn.active').textContent;
            if (activeTab.includes('Cards')) {
                exportCardsToZip();
            } else if (activeTab.includes('Board')) {
                exportBoardToPng();
            } else if (activeTab.includes('Back')) {
                exportCardBackToPng();
            }
        }

        async function exportCardsToZip() {
            document.getElementById('loading-msg').style.display = 'block';
            const zip = new JSZip();
            const cards = document.querySelectorAll('#deck-container .card');
            
            try {
                for (let i = 0; i < cards.length; i++) {
                    const canvas = await html2canvas(cards[i], { scale: 4, useCORS: true });
                    const imgData = canvas.toDataURL("image/png").split(',')[1];
                    zip.file(`Alias_Card_${i + 1}.png`, imgData, { base64: true });
                }
                zip.generateAsync({ type: "blob" }).then(function (content) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = "Alias_Cards.zip";
                    link.click();
                });
            } catch (err) { alert("Error generating zip. Try the 'Export as PDF' button instead."); }
            document.getElementById('loading-msg').style.display = 'none';
        }

        async function exportBoardToPng() {
            document.getElementById('loading-msg').style.display = 'block';
            const board = document.getElementById('board-capture-area');
            try {
                const canvas = await html2canvas(board, { scale: 3, useCORS: true });
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = "Alias_Board.png";
                link.click();
            } catch (err) { alert("Error generating PNG. Try the 'Export as PDF' button instead."); }
            document.getElementById('loading-msg').style.display = 'none';
        }

        async function exportCardBackToPng() {
            document.getElementById('loading-msg').style.display = 'block';
            const backDesign = document.getElementById('back-capture-area');
            try {
                const canvas = await html2canvas(backDesign, { scale: 4, useCORS: true });
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = "Alias_Card_Back.png";
                link.click();
            } catch (err) { alert("Error generating PNG. Try the 'Export as PDF' button instead."); }
            document.getElementById('loading-msg').style.display = 'none';
        }
    </script>
</body>
