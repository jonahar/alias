<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALIAS: Wedding Edition</title>
    
    <!-- Load elegant Hebrew font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">

    <!-- Libraries for generating PNGs and ZIP files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        @page { size: 2.5in 3.5in; margin: 0; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Frank Ruhl Libre', serif;
            background-color: #f7f3e8; 
        }
        
        .card {
            width: 2.5in; height: 3.5in; 
            background-color: #ffffff; 
            box-sizing: border-box; 
            border: 8px solid #778b71; 
            border-radius: 20px; 
            page-break-after: always; break-after: page;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            margin: 10px auto; /* Centered for screen viewing */
        }
        
        .card-header-area {
            text-align: center; padding: 25px 0 10px 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        .card-title {
            font-size: 16pt; font-weight: 700; color: #778b71; 
            margin: 0; letter-spacing: 1px;
        }

        .word-list {
            margin: 0 auto; padding: 0; list-style: none; counter-reset: word-counter;
            width: 85%; flex-grow: 1; display: flex; flex-direction: column; 
            justify-content: space-evenly; padding-bottom: 20px;
        }
        
        .word-list li {
            counter-increment: word-counter; font-size: 14pt; font-weight: 700; 
            color: #333; display: flex; align-items: center; 
            padding: 8px 0; border-bottom: 1px solid #eee; 
        }
        
        .word-list li:last-child { border-bottom: none; }
        
        .word-list li::before {
            content: counter(word-counter); color: #bfa071; font-weight: 700;
            font-size: 15pt; width: 25px; margin-left: 10px; 
            text-align: left; display: inline-block;
        }

        /* --- UI and Export Panel --- */
        @media print { 
            body { background-color: white; } 
            #control-panel { display: none !important; } 
            .card { box-shadow: none; margin: 0; }
        }

        #control-panel { 
            padding: 20px; text-align: center; background: #fff; 
            margin-bottom: 20px; border-bottom: 2px solid #ddd; 
            font-family: sans-serif; direction: ltr; /* Keeping UI LTR for English/Code */
        }

        .export-btn {
            background-color: #778b71; color: white; border: none;
            padding: 10px 20px; font-size: 14px; border-radius: 5px;
            cursor: pointer; margin: 5px; font-weight: bold;
        }

        .export-btn:hover { background-color: #5c6c57; }
        #loading-msg { display: none; color: #778b71; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2 style="color:#778b71; margin-top: 0; font-family:'Frank Ruhl Libre', serif; direction:rtl;">ALIAS: מהדורת חתונה</h2>
        <button class="export-btn" onclick="window.print()">Export as PDF</button>
        <button class="export-btn" onclick="exportToZip()">Export as ZIP (PNGs)</button>
        <div id="loading-msg">Generating High-Res Images... Please wait.</div>
    </div>

    <div id="deck"></div>

    <!-- ========================================== -->
    <!-- PASTE YOUR WORDS HERE (ONE WORD PER LINE)  -->
    <!-- ========================================== -->
    <script type="text/plain" id="raw-words">
חופה
טבעת נישואין
שבירת הכוס
הינומה
ריקוד סלואו
ירח דבש
שמלת כלה
חליפת חתן
כתובה
זר פרחים
צילומי זוגיות
קבלת פנים
הזמנה לחתונה
מסיבת רווקות
שושבינה
מתנות לאורחים
זרקורים
חתן וכלה
ריקודים
ברכות
צילום מגנטים
דיג'יי
אולם אירועים
שבע ברכות
כניסה לחופה
מזל טוב
עוגת חתונה
    </script>
    <!-- ========================================== -->

    <script>
        const wordsPerCard = 6; 
        const deckContainer = document.getElementById('deck');
        const rawText = document.getElementById('raw-words').textContent;

        const myWords = rawText.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0);

        for (let i = 0; i < myWords.length; i += wordsPerCard) {
            const cardWords = myWords.slice(i, i + wordsPerCard);
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            
            const headerArea = document.createElement('div');
            headerArea.className = 'card-header-area';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'card-title';
            titleDiv.textContent = 'מהדורת חתונה'; 
            headerArea.appendChild(titleDiv);
            cardDiv.appendChild(headerArea);

            const ol = document.createElement('ol');
            ol.className = 'word-list';
            cardWords.forEach(word => {
                const li = document.createElement('li');
                li.textContent = word;
                ol.appendChild(li);
            });
            
            cardDiv.appendChild(ol);
            deckContainer.appendChild(cardDiv);
        }

        // --- ZIP Export Logic ---
        async function exportToZip() {
            document.getElementById('loading-msg').style.display = 'block';
            const zip = new JSZip();
            const cards = document.querySelectorAll('.card');
            
            for (let i = 0; i < cards.length; i++) {
                // scale: 4 gives print-quality resolution (roughly 300+ DPI)
                const canvas = await html2canvas(cards[i], { scale: 4, useCORS: true });
                const imgData = canvas.toDataURL("image/png").split(',')[1];
                zip.file(`Alias_Card_${i + 1}.png`, imgData, { base64: true });
            }
            
            zip.generateAsync({ type: "blob" }).then(function (content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "Alias_Cards.zip";
                link.click();
                document.getElementById('loading-msg').style.display = 'none';
            });
        }
    </script>
</body>
</html>
